name: Release Build

on:
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Attach JAR to Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.2.0 --distribution-type bin

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Resolve JAR path
        id: jar
        run: |
          jar_path=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" | head -n 1)
          if [ -z "$jar_path" ]; then
            echo "::error::No release JAR found in build/libs"
            exit 1
          fi
          echo "path=$jar_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar_path")" >> "$GITHUB_OUTPUT"

      - name: Attach JAR to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
          fail_on_unmatched_files: true
